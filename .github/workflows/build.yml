name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: laudo-doppler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build:mac
      - uses: actions/upload-artifact@v4
        with:
          name: instalador-mac
          path: laudo-doppler/dist-installers/*.dmg

  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: laudo-doppler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build:win
      - uses: actions/upload-artifact@v4
        with:
          name: instalador-windows
          path: laudo-doppler/dist-installers/*.exe
