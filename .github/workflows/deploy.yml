name: Deploy Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install
        working-directory: laudo-doppler

      - name: Build do site
        run: npm run build:web
        working-directory: laudo-doppler

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Upload do site
        uses: actions/upload-pages-artifact@v3
        with:
          path: laudo-doppler/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
